on:
  push:
    tags:
      - 'v*'

name: tag-and-release
jobs:
  check-debug:
    runs-on: ubuntu-latest
    outputs:
      debug_enabled: ${{ steps.check-msg.outputs.debug_enabled }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Extract tag commit message and set debug flag
        id: check-msg
        run: |
          msg=$(git log -1 --pretty=%B)
          echo "Commit message: $msg"
          if echo "$msg" | grep -iq "#debug"; then
            echo "debug_enabled=true" >> $GITHUB_OUTPUT
          else
            echo "debug_enabled=false" >> $GITHUB_OUTPUT
          fi

  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Verify commit is on main
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "::error::Tagged commit is not on the main branch. Aborting release."
            exit 1
          fi
      - name: Verify CI passed for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub Actions reports results as check runs, not commit statuses.
          # Poll until CI finishes (up to 30 minutes), then check result.
          MAX_ATTEMPTS=60
          SLEEP=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            CONCLUSION=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
              --jq '[.check_runs[] | select(.name | startswith("ci-build"))] | if length == 0 then "not_found" elif any(.conclusion == null) then "in_progress" elif all(.conclusion == "success") then "success" else map(select(.conclusion != "success")) | first | .conclusion // .status end')
            echo "Attempt $i/$MAX_ATTEMPTS: CI status = $CONCLUSION"
            if [ "$CONCLUSION" = "success" ]; then
              echo "CI passed."
              exit 0
            elif [ "$CONCLUSION" = "in_progress" ] || [ "$CONCLUSION" = "not_found" ]; then
              echo "CI still running or not started yet. Waiting ${SLEEP}s..."
              sleep $SLEEP
            else
              echo "::error::CI failed for this commit (conclusion: $CONCLUSION). Aborting release."
              gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs" \
                --jq '.check_runs[] | select(.name | startswith("ci-build")) | "\(.name): \(.conclusion // .status)"'
              exit 1
            fi
          done
          echo "::error::Timed out waiting for CI to complete after $((MAX_ATTEMPTS * SLEEP))s."
          exit 1

  build-shared:
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - name: build
        run: ./gradlew --no-daemon clean build installDist publish -x spotlessCheck -x test -x integrationTest --build-cache --scan -s
      - name: Upload build results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build

  build-native-image:
    needs: build-shared
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - name: setup-graalvm
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
            java-version: '25'
            distribution: 'graalvm-community'
            github-token: ${{ secrets.GITHUB_TOKEN }}
            set-java-home: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: build-native-image
        run: ./gradlew --no-daemon nativeImage
      - name: ensure native image is executable
        run: chmod -v +x build/native-image/jbang.bin*
      - name: build-native-bundles
        run: ./gradlew --no-daemon nativeDistZip nativeDistTar latestNativeDistZip latestNativeDistTar
      - name: upload-native-bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-jbang-native-bundles-${{ matrix.os }}
          path: |
            build/distributions/*-${{ runner.os == 'macOS' && 'mac' || runner.os == 'Windows' && 'windows' || 'linux' }}-*.zip
            build/distributions/*-${{ runner.os == 'macOS' && 'mac' || runner.os == 'Windows' && 'windows' || 'linux' }}-*.tar
          if-no-files-found: error

  smoke-test:
    needs: build-shared
    runs-on: ubuntu-latest
    env:
      _JBANG_: ./build/install/jbang/bin/jbang
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: smoke-test
        run: |
          chmod +x $_JBANG_
          $_JBANG_ init --template=cli helloworld.java
          $_JBANG_ --verbose helloworld.java
          rm helloworld.java

  release:
    needs: [check-debug, build-shared, build-native-image, smoke-test]
    runs-on: ubuntu-latest
    name: release
    env:
      JRELEASER_SDKMAN_CONSUMER_KEY: ${{ secrets.SDKMAN_CONSUMER_KEY }}
      JRELEASER_SDKMAN_CONSUMER_TOKEN: ${{ secrets.SDKMAN_CONSUMER_TOKEN }}
      JRELEASER_TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
      JRELEASER_TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
      JRELEASER_TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
      JRELEASER_TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
      JRELEASER_BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}
      JRELEASER_GITHUB_TOKEN: ${{ secrets.BREW_GITHUB_TOKEN }}
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
      JRELEASER_MAVENCENTRAL_JBANG_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      JRELEASER_MAVENCENTRAL_JBANG_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      JRELEASER_SECRETS_HINT: ${{ secrets.JRELEASER_SECRETS_HINT }}
      JRELEASER_VERSION: early-access
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
        with:
          java-version: 11
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: Download native bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ steps.shared-build.outputs.github-short-sha }}-jbang-native-bundles-*
          path: build/distributions
          merge-multiple: true
          if-no-files-found: error
      - name: version extract
        id: version
        run: |
          RELEASE_VERSION=`cat build/tmp/version.txt`
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE_VERSION"
          ls -la build/distributions
      - name: Run JReleaser
        uses: jreleaser/release-action@97b5e2f0e845de2fe1dbbdf451ac6a21233fafff # v2
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
        with:
          version: ${{ env.JRELEASER_VERSION }}
          arguments: release
          setup-java: false
      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jreleaser-release
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties

      - name: Start tmate session
        if: always() && needs.check-debug.outputs.debug_enabled == 'true'
        uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3
        with:
            limit-access-to-actor: true
