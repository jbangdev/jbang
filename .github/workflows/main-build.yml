name: main-build

## Runs full CI on every push to main and publishes an earlyaccess
## pre-release with the latest artifacts (including native bundles).

on:
  push:
    branches:
    - main
  workflow_dispatch:

concurrency:
  group: earlyaccess-release
  cancel-in-progress: true

jobs:
  ci-build:
    uses: ./.github/workflows/step-ci-build.yml
    secrets: inherit

  earlyaccess:
    needs: ci-build
    runs-on: ubuntu-latest
    env:
      JRELEASER_SECRETS_HINT: ${{ secrets.JRELEASER_SECRETS_HINT }}
      JRELEASER_VERSION: early-access
      JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
      JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
      JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_SECRET_KEY }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: Download native bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ steps.shared-build.outputs.github-short-sha }}-jbang-native-bundles-*
          path: build/distributions
          merge-multiple: true
          if-no-files-found: warn
      - name: version extract
        id: version
        run: |
          RELEASE_VERSION=`cat build/tmp/version.txt`
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE_VERSION"
          ls -la build/distributions
          if [[ "$RELEASE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to publish earlyaccess for proper release version $RELEASE_VERSION (only 3 digits)."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Push early-access tag
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag --force early-access ${{ github.sha }}
          git push --force origin refs/tags/early-access
      - name: Run JReleaser (earlyaccess)
        if: steps.version.outputs.skip != 'true'
        uses: jreleaser/release-action@97b5e2f0e845de2fe1dbbdf451ac6a21233fafff # v2
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_DRAFT: false
        with:
          version: ${{ env.JRELEASER_VERSION }}
          arguments: full-release --yolo
          setup-java: false
      - name: Mark release as pre-release (not draft)
        if: steps.version.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete any older early-access releases (JReleaser creates a new draft each run)
          gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.tag_name=="early-access")] | sort_by(.created_at) | reverse | .[1:] | .[].id' \
          | while read id; do
            echo "Deleting old early-access release $id"
            gh api --method DELETE repos/${{ github.repository }}/releases/$id || true
          done
          # Un-draft the latest one
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.tag_name=="early-access")] | sort_by(.created_at) | last | .id')
          if [ -n "$RELEASE_ID" ] && [ "$RELEASE_ID" != "null" ]; then
            echo "Marking release $RELEASE_ID as published pre-release"
            gh api --method PATCH repos/${{ github.repository }}/releases/$RELEASE_ID \
              -F draft=false -F prerelease=true
          else
            echo "::warning::Could not find early-access release to un-draft"
          fi
      - name: JReleaser output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jreleaser-earlyaccess
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
