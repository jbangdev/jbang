name: step-ci-build
on:
  workflow_dispatch:
    inputs: &inputs
      debug_enabled:
        description: 'Run the build with tmate debugging enabled (https://github.com/marketplace/actions/debugging-with-tmate)'
        required: false
        type: boolean
        default: false
      debug_detached:
        description: 'Run tmate debugging in detached mode'
        required: false
        type: boolean
        default: true
      skip_tests:
        description: 'Skip all test jobs (tests, integration tests, smoke tests)'
        required: false
        type: boolean
        default: false
      skip_jreleaser_dry_run:
        description: 'Skip JReleaser dry-run (e.g. when called from release workflow)'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs: *inputs


jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - uses: ./.github/actions/shared-build-setup
      - name: check formatting and comment on PR if failed
        id: check-formatting
        run: ./gradlew --no-daemon spotlessCheck

  build-shared:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - name: build-with-no-tests
        run: ./gradlew --no-daemon clean build installDist publish -x spotlessCheck -x test -x integrationTest --build-cache --scan -s
      - name: Upload jbang.zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build-jbang
          path: build/install/jbang
      - name: Upload build results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name:  ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build

  build-test-native-image:
    needs: build-shared
    strategy:
      fail-fast: false
      matrix:
        os: &os_matrix [ubuntu-latest,windows-latest,macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - name: setup-graalvm
        uses: graalvm/setup-graalvm@bef4b0e916c7dd079bf60fb95d49139f67e32c5f # v1
        with:
            java-version: '25'      
            distribution: 'graalvm-community' # like to use mandrel but using community for now
            github-token: ${{ secrets.GITHUB_TOKEN }}
            set-java-home: false # we should not use graalvm for java builds (we need java 11)
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: build-native-image
        run: |
          ./gradlew --no-daemon nativeImage
      - name: ensure native image is executable
        run: |
            chmod -v +x build/native-image/jbang.bin*
      - name: upload-native-image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-jbang.bin-${{ matrix.os }}
          path: build/native-image/*
          if-no-files-found: error

      - name: build-native-bundles
        run: |
          ./gradlew --no-daemon nativeDistZip nativeDistTar latestNativeDistZip latestNativeDistTar

      - name: upload-native-bundles
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-jbang-native-bundles-${{ matrix.os }}
          path: |
            build/distributions/*-${{ runner.os == 'macOS' && 'mac' || runner.os == 'Windows' && 'windows' || 'linux' }}-*.zip
            build/distributions/*-${{ runner.os == 'macOS' && 'mac' || runner.os == 'Windows' && 'windows' || 'linux' }}-*.tar
          if-no-files-found: error
      
      - name: create install with native binary
        if: ${{ !inputs.skip_tests }}
        run: |
          rm -rf build/install/jbang
          ./gradlew --no-daemon installDist
      - name: integration-test-native-image
        if: ${{ !inputs.skip_tests }}
        env:
          JBANG_USE_NATIVE: true
        run: |
          ./gradlew --no-daemon integrationTest
      - name: Arcive test results
        if: ${{ !inputs.skip_tests && always() }}
        uses: ./.github/actions/shared-test-archiving
        with:
          prefix: ${{ steps.shared-build.outputs.github-short-sha }}-test-native-image-
          suffix: -${{matrix.os}}
      - name: Archive build results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-test-native-image-build-${{ matrix.os }}
          path: build

 
  unit-test-jvm:
    if: ${{ !inputs.skip_tests }}
    needs: build-shared
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java-version: [11]
        os: *os_matrix
    steps:
      - uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e #
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: test
        run: |
          ./gradlew --no-daemon test -PtestJavaVersion=${{ matrix.java-version }}
      - name: Arcive test results
        uses: ./.github/actions/shared-test-archiving
        if: always()
        with:
          prefix: ${{ steps.shared-build.outputs.github-short-sha }}-unit-test-jvm-
          suffix: -${{matrix.os}}-${{ matrix.java-version }}
      - name: Archive build results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-unit-test-jvm-build-${{ matrix.os }}-${{ matrix.java-version }}
          path: build
      - name: Write out Unit Test report annotation for forked repo
        if: failure()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6
        with:
          report_paths: 'build/test-results/test/TEST-*.xml'
          annotate_only: true # forked repo cannot write to checks so just do annotations
      - name: Add artifact.ci links
        if: failure()
        shell: bash
        run: |
          BASE="https://www.artifact.ci/artifact/view/${{ github.repository }}/run/${{ github.run_id }}.${{ github.run_attempt}}"
          echo "View [Allure Report](${BASE}/allure-report-${{ matrix.os }}) [direct link (available after first view)](${BASE}/allure-report-${{ matrix.os }}/build/reports/allure-report/allureReport/index.html) for ${{ matrix.os }} build" >> $GITHUB_STEP_SUMMARY

  integration-test-jvm:
    if: ${{ !inputs.skip_tests }}
    needs: build-shared
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        java-version: [8,11,17,21,25]
        os: *os_matrix
        exclude: 
            # Windows should only run Java 11 and 25
            - os: windows-latest
              java-version: 8
            - os: windows-latest
              java-version: 17
            - os: windows-latest
              java-version: 21

            # macOS should only run Java 11 and 25
            - os: macos-latest
              java-version: 8
            - os: macos-latest
              java-version: 17
            - os: macos-latest
              java-version: 21
    name: integration-tests
    steps:
      - uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e #
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: integration-test
        env:
          _JBANG_TEST_JAVA_VERSION: ${{ matrix.java-version }}
        run: |
          ./gradlew --no-daemon integrationTest
      - name: Arcive test results
        uses: ./.github/actions/shared-test-archiving
        if: always()
        with:
          prefix: ${{ steps.shared-build.outputs.github-short-sha }}-integration-test-jvm-
          suffix: -${{matrix.os}}-${{ matrix.java-version }}
      - name: Archive build results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-integration-test-jvm-build-${{ matrix.os }}-${{ matrix.java-version }}
          path: build

      - name: Write out Unit Test report annotation for forked repo
        if: failure()
        uses: mikepenz/action-junit-report@3a81627bfac62268172037048872e8ebd4207e6d # v6
        with:
          report_paths: 'build/test-results/test/TEST-*.xml'
          annotate_only: true # forked repo cannot write to checks so just do annotations
      - name: Add artifact.ci links
        if: failure()
        shell: bash
        run: |
          BASE="https://www.artifact.ci/artifact/view/${{ github.repository }}/run/${{ github.run_id }}.${{ github.run_attempt}}"
          echo "View [Allure Report](${BASE}/allure-report-${{ matrix.os }}) [direct link (available after first view)](${BASE}/allure-report-${{ matrix.os }}/build/reports/allure-report/allureReport/index.html) for ${{ matrix.os }} build" >> $GITHUB_STEP_SUMMARY

  smoke-test:
    if: ${{ !inputs.skip_tests }}
    needs: build-shared
    strategy:
      ## disable fail-fast so on variance failing don't fail the rest
      #fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java: [8,11,17,21,25]
    runs-on: ${{ matrix.os }}
    env:
      _JBANG_: ./build/install/jbang/bin/jbang
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
        with:
          add-job-summary: 'never'
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: smoke-test
        run: |
          java -version
          chmod +x $_JBANG_
          $_JBANG_ init --template=cli helloworld.java
          $_JBANG_ --verbose helloworld.java
          rm helloworld.java
      - name: smoke-quarkus-test
        run: |
          java -version
          chmod +x $_JBANG_
          $_JBANG_ init --template=qcli qcli.java
          $_JBANG_ --fresh --verbose qcli.java
          rm qcli.java
      - name: smoke-quarkus-diff-version-test
        run: |
          java -version
          chmod +x $_JBANG_
          $_JBANG_ init --template=qcli qcli.java
          $_JBANG_ --fresh --verbose --java 17 qcli.java
          rm qcli.java
      - name: integration-test-non-windows
        if: runner.os != 'Windows'
        run: |
          export PATH=`pwd`/build/install/jbang/bin:$PATH
          cd build/itests
          chmod +x ./test_suite.sh
          ./test_suite.sh

  jreleaser-dry-run:
    needs: [build-shared, build-test-native-image]
    if: always() && needs.build-shared.result == 'success' && !inputs.skip_jreleaser_dry_run
    runs-on: ubuntu-latest
    env:
      JRELEASER_VERSION: 1.24.0
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-shared-build
          path: build
      - name: Download native bundles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ steps.shared-build.outputs.github-short-sha }}-jbang-native-bundles-*
          path: build/distributions
          merge-multiple: true
          if-no-files-found: warn
      - name: version extract
        id: version
        run: |
          RELEASE_VERSION=`cat build/tmp/version.txt`
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "Release version: $RELEASE_VERSION"
          ls -la build/distributions
      - name: Run JReleaser (dry-run)
        uses: jreleaser/release-action@97b5e2f0e845de2fe1dbbdf451ac6a21233fafff # v2
        env:
          JRELEASER_PROJECT_VERSION: ${{ steps.version.outputs.RELEASE_VERSION }}
          JRELEASER_GITHUB_TOKEN: unused-dry-run
          JRELEASER_GPG_PASSPHRASE: unused-dry-run
          JRELEASER_GPG_PUBLIC_KEY: unused-dry-run
          JRELEASER_GPG_SECRET_KEY: unused-dry-run
          JRELEASER_MAVENCENTRAL_JBANG_USERNAME: unused-dry-run
          JRELEASER_MAVENCENTRAL_JBANG_PASSWORD: unused-dry-run
        with:
          version: ${{ env.JRELEASER_VERSION }}
          arguments: release --dry-run
          setup-java: false
      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: ${{ steps.shared-build.outputs.github-short-sha }}-jreleaser-release-artifacts
          path: out/jreleaser/

  merge-test-reports:
    if: always() && !inputs.skip_tests
    needs: [unit-test-jvm, integration-test-jvm, build-test-native-image]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ steps.shared-build.outputs.github-short-sha }}-*-allure-results-*
          path: build/allure-results
          merge-multiple: true
      - id: generate-report
        run: ./gradlew --no-daemon allureReport --clean
      - name: Arcive test results
        uses: ./.github/actions/shared-test-archiving
        with:
          prefix: ${{ steps.shared-build.outputs.github-short-sha }}-merged-allurereport-
          suffix: ${{ matrix.os }}

  test-results-summary:
    if: always() && !inputs.skip_tests
    needs: [merge-test-reports]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - id: shared-build
        uses: ./.github/actions/shared-build-setup
      - name: Create test results summary
        run: |
          SHA_PREFIX="${{ steps.shared-build.outputs.github-short-sha }}"
          BASE="https://www.artifact.ci/artifact/view/${{ github.repository }}/run/${{ github.run_id }}.${{ github.run_attempt}}/${SHA_PREFIX}"
          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # 🧪 Test Results Summary

          ## 📊 Combined Reports (All Tests Merged)

          - **Merged Allure Report**: [artifact.ci](${BASE}-merged-allurereport-allure-report) | [direct](${BASE}-merged-allurereport-allure-report/index.html) - All unit and integration tests across all platforms

          ## 🖥️ Unit Test Reports (by Platform)

          - **Ubuntu Latest**: [artifact.ci](${BASE}-unit-test-jvm-allure-report-ubuntu-latest) | [direct](${BASE}-unit-test-jvm-allure-report-ubuntu-latest/index.html)
          - **macOS Latest**: [artifact.ci](${BASE}-unit-test-jvm-allure-report-macos-latest) | [direct](${BASE}-unit-test-jvm-allure-report-macos-latest/index.html)
          - **Windows Latest**: [artifact.ci](${BASE}-unit-test-jvm-allure-report-windows-latest) | [direct](${BASE}-unit-test-jvm-allure-report-windows-latest/index.html)

          ## 🔧 Integration Test Reports (by Platform)

          ### Ubuntu
          - **Java 8**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-8) | [direct](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-8/index.html)
          - **Java 11**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-11) | [direct](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-11/index.html)
          - **Java 17**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-17) | [direct](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-17/index.html)
          - **Java 21**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-21) | [direct](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-21/index.html)
          - **Java 25**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-25) | [direct](${BASE}-integration-test-jvm-allure-report-ubuntu-latest-25/index.html)

          ### macOS
          - **Java 11**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-macos-latest-11) | [direct](${BASE}-integration-test-jvm-allure-report-macos-latest-11/index.html)
          - **Java 25**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-macos-latest-25) | [direct](${BASE}-integration-test-jvm-allure-report-macos-latest-25/index.html)

          ### Windows
          - **Java 11**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-windows-latest-11) | [direct](${BASE}-integration-test-jvm-allure-report-windows-latest-11/index.html)
          - **Java 25**: [artifact.ci](${BASE}-integration-test-jvm-allure-report-windows-latest-25) | [direct](${BASE}-integration-test-jvm-allure-report-windows-latest-25/index.html)

          ## 🚀 Native Image Test Reports

          - **Ubuntu Latest**: [artifact.ci](${BASE}-test-native-image-allure-report-ubuntu-latest) | [direct](${BASE}-test-native-image-allure-report-ubuntu-latest/index.html)
          - **macOS Latest**: [artifact.ci](${BASE}-test-native-image-allure-report-macos-latest) | [direct](${BASE}-test-native-image-allure-report-macos-latest/index.html)
          - **Windows Latest**: [artifact.ci](${BASE}-test-native-image-allure-report-windows-latest) | [direct](${BASE}-test-native-image-allure-report-windows-latest/index.html)

          ---
          *Note: Visit the artifact.ci link first, then the direct link will work*
          EOF


